<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>InternHub | Registration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2463eb",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Navigation -->
<header class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 px-6 md:px-20 py-4 bg-white dark:bg-slate-900">
<div class="flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-3xl font-bold">layers</span>
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight tracking-tight">InternHub</h2>
</div>
<div class="flex items-center gap-4">
<span class="hidden md:inline text-slate-600 dark:text-slate-400 text-sm">Already have an account?</span>
<button class="flex min-w-[100px] cursor-pointer items-center justify-center rounded-lg h-10 px-4 bg-primary/10 text-primary text-sm font-bold hover:bg-primary/20 transition-colors">
<span>Sign In</span>
</button>
</div>
</header>
<main class="flex-1 flex items-center justify-center p-6 lg:p-12">
<div class="w-full max-w-xl bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden">
<div class="p-8 md:p-10">
<div class="text-center mb-10">
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold mb-2">Create your account</h1>
<p class="text-slate-500 dark:text-slate-400 text-base">Join the leading internship network and launch your career</p>
</div>
<!-- Tabs -->
<div class="flex border-b border-slate-200 dark:border-slate-800 mb-8">
<a class="flex-1 flex flex-col items-center justify-center border-b-2 border-primary pb-4 transition-colors" href="#">
<span class="text-primary text-sm font-bold tracking-tight">Student Registration</span>
</a>
<a class="flex-1 flex flex-col items-center justify-center border-b-2 border-transparent pb-4 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors" href="#">
<span class="text-sm font-bold tracking-tight">Company Registration</span>
</a>
</div>
<!-- Registration Form (Student default view) -->
<form class="space-y-5">
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium">Full Name</label>
<input class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent p-3 outline-none transition-all" placeholder="John Doe" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium">Roll Number</label>
<input class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent p-3 outline-none transition-all" placeholder="CS2024001" type="text"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium">Department</label>
<select class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent p-3 outline-none transition-all appearance-none">
<option>Computer Science</option>
<option>Electrical Engineering</option>
<option>Mechanical Engineering</option>
<option>Business Administration</option>
<option>Design &amp; Arts</option>
</select>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium">Email Address</label>
<input class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent p-3 outline-none transition-all" placeholder="john@university.edu" type="email"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium">Password</label>
<div class="relative">
<input class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent p-3 outline-none transition-all" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-3 top-3 text-slate-400 cursor-pointer">visibility</span>
</div>
<p class="text-xs text-slate-500 mt-1">Must be at least 8 characters with one number.</p>
</div>
<div class="pt-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2" type="submit">
<span>Create Student Account</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-8 pt-8 border-t border-slate-100 dark:border-slate-800 flex flex-col gap-4">
<p class="text-center text-slate-500 text-xs px-10">
                            By signing up, you agree to our <a class="text-primary underline" href="#">Terms of Service</a> and <a class="text-primary underline" href="#">Privacy Policy</a>.
                        </p>
</div>
</div>
</div>
</main>
<!-- Illustration Background Element -->
<div class="fixed bottom-0 right-0 -z-10 opacity-10 dark:opacity-5 pointer-events-none p-20">
<svg height="400" viewbox="0 0 200 200" width="400" xmlns="http://www.w3.org/2000/svg">
<path d="M44.7,-76.4C58.8,-69.2,71.8,-59.1,79.6,-45.8C87.4,-32.5,90,-16.2,88.5,-0.9C87,14.5,81.4,28.9,72.9,41.4C64.4,53.8,53,64.2,39.9,71.5C26.8,78.8,13.4,83,0,83C-13.4,83,-26.8,78.8,-39.7,71.3C-52.6,63.9,-65.1,53.1,-73.4,40.1C-81.8,27.1,-86,11.8,-84.9,-2.7C-83.8,-17.2,-77.4,-30.9,-68.2,-42.6C-58.9,-54.3,-46.8,-64,-33.7,-71.8C-20.6,-79.7,-10.3,-85.7,2.5,-90C15.2,-94.3,30.5,-83.6,44.7,-76.4Z" fill="#2463eb" transform="translate(100 100)"></path>
</svg>
</div>
</div>
</div>
</body></html>
